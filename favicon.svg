<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Study Suite">
  <rect width="64" height="64" rx="14" fill="#002a5d"/>
  <!-- back card (a peek behind = a "suite"/stack) -->
  <rect x="27" y="14" width="21" height="31" rx="4" fill="#8fb0d0"/>
  <!-- front study card -->
  <rect x="16" y="18" width="24" height="31" rx="4.5" fill="#f4f7fb"/>
  <!-- note lines -->
  <rect x="21" y="25" width="14" height="3" rx="1.5" fill="#002a5d"/>
  <rect x="21" y="31.5" width="14" height="3" rx="1.5" fill="#2a6bb2"/>
  <rect x="21" y="38" width="9" height="3" rx="1.5" fill="#002a5d"/>
  <!-- corner monogram -->
  <text x="35.5" y="47.5" font-family="Georgia, 'DejaVu Serif', serif" font-weight="bold" font-size="10" fill="#002a5d" text-anchor="middle">S</text>
</svg>
